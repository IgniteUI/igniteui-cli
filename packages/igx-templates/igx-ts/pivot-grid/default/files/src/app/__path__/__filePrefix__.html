<div class="page">

    You can read more about configuring the igx-pivot-grid component in the
    <a href="https://www.infragistics.com/products/ignite-ui-angular/angular/components/pivotGrid/pivot-grid"
      target="_blank">official documentation</a>.

  <div class="grid-wrapper">
    <igx-pivot-grid #grid1 [data]="data" [pivotConfiguration]="pivotConfigHierarchy" height="650px" width="100%">
    </igx-pivot-grid>
  </div>
</div>
