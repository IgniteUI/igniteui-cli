<div class="page">
  <p class="title">{{ title }}</p>
  <p class="subtitle">igx-grid component with auto generated columns below and local data.<br />
    You can read more about configuring the igx-grid component in the
    <a href="https://github.com/IgniteUI/igniteui-angular/blob/master/projects/igniteui-angular/src/lib/grids/README.md" target="_blank">README</a> or the
    <a href="https://www.infragistics.com/products/ignite-ui-angular/angular/components/grid/grid" target="_blank">official documentation</a>.
  </p>
  <div class="grid-wrapper">
    <igx-grid #grid1 [data]="localData" [autoGenerate]="true" (columnInit)="onColumnInit($event)" width="100%" height="600px">
      <igx-paginator></igx-paginator>
    </igx-grid>
  </div>
</div>
