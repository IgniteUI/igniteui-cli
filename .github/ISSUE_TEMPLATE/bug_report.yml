---
name: Bug Report
description: Report a bug with the Ignite UI CLI
labels: ["bug"]
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: cli-version
    attributes:
      label: Ignite UI CLI Version
      description: "Run `ig --version` to find your CLI version."
      placeholder: "e.g. 13.2.0"
    validations:
      required: true

  - type: dropdown
    id: framework
    attributes:
      label: Framework
      description: Which framework are you using?
      options:
        - Angular
        - React
        - jQuery
        - Web Components
    validations:
      required: true

  - type: dropdown
    id: project-type
    attributes:
      label: Project Type
      description: Which project type are you using?
      options:
        - igx-ts (Angular)
        - igr-ts (React)
        - js (jQuery)
        - igc-ts (Web Components)
    validations:
      required: true

  - type: dropdown
    id: command
    attributes:
      label: CLI Command
      description: Which command is not working as expected?
      options:
        - new
        - add
        - generate
        - start
        - build
        - test
        - config
        - list
        - doc
        - upgrade-packages
        - Other
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: "Run `node --version` to find your Node.js version."
      placeholder: "e.g. 20.11.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: dropdown
    id: package-manager
    attributes:
      label: Package Manager
      options:
        - npm
        - yarn
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce the issue.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Result
      description: What happened after following the steps above?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Result
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error Output / Logs
      description: Paste any relevant error messages or terminal output.
      render: shell
    validations:
      required: false

  - type: textarea
    id: attachments
    attributes:
      label: Additional Context
      description: Add screenshots, sample projects, or any other context.
    validations:
      required: false
